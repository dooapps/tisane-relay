swagger: "2.0"
info:
  title: tisane-relay-gateway
  version: "1.0.0"
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

paths:
  /health:
    get:
      operationId: healthGet
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      responses:
        "200":
          description: OK

  /relay/push:
    post:
      operationId: relayPush
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      parameters:
        - in: body
          name: events
          required: true
          schema:
            type: array
            items:
              type: object
              required:
                - event_id
                - author_pubkey
                - signature
              properties:
                event_id:
                  type: string
                  format: uuid
                author_pubkey:
                  type: string
                  description: Hex-encoded Ed25519 public key (64 hex chars)
                  example: "d64315263a2c445caf75790784b4e913bc1915223a2c445caf75790784b4e913"
                signature:
                  type: string
                  description: Hex-encoded Ed25519 signature (128 hex chars)
                  example: "e64a8b7..."
                payload_json:
                  type: object
                  description: Event payload to be hashed and signed
                  example:
                    type: "message"
                    text: "Hello World"
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Invalid signature
        "400":
          description: Bad Request - Missing required fields or invalid hex

  /distillery/rank:
    post:
      operationId: distilleryRank
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      parameters:
        - in: body
          name: request
          required: true
          schema:
            type: object
            required:
              - candidates
            properties:
              surface:
                type: string
              account_id:
                type: string
              candidates:
                type: array
                items:
                  type: object
                  required:
                    - candidate_id
                  properties:
                    candidate_id:
                      type: string
                    read_completed:
                      type: integer
                    citation_created:
                      type: integer
                    derivative_created:
                      type: integer
                    value_snapshot:
                      type: number
      responses:
        "200":
          description: Ranked candidates

  /distillery/distribute:
    post:
      operationId: distilleryDistribute
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      parameters:
        - in: body
          name: request
          required: true
          schema:
            type: object
            required:
              - candidates
            properties:
              surface:
                type: string
              account_id:
                type: string
              slot_count:
                type: integer
              max_per_author:
                type: integer
              max_per_channel:
                type: integer
              candidates:
                type: array
                items:
                  type: object
                  required:
                    - candidate_id
                  properties:
                    candidate_id:
                      type: string
                    author_id:
                      type: string
                    channel:
                      type: string
                    read_completed:
                      type: integer
                    citation_created:
                      type: integer
                    derivative_created:
                      type: integer
                    value_snapshot:
                      type: number
      responses:
        "200":
          description: Distributed slots

  /distillery/rank-from-events:
    post:
      operationId: distilleryRankFromEvents
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      parameters:
        - in: body
          name: request
          required: true
          schema:
            type: object
            properties:
              surface:
                type: string
              account_id:
                type: string
              channel:
                type: string
              since_hours:
                type: integer
              limit:
                type: integer
      responses:
        "200":
          description: Ranked candidates derived from relay events

  /distillery/feed-from-events:
    post:
      operationId: distilleryFeedFromEvents
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      parameters:
        - in: body
          name: request
          required: true
          schema:
            type: object
            properties:
              surface:
                type: string
              account_id:
                type: string
              channel:
                type: string
              slot_count:
                type: integer
              max_per_author:
                type: integer
              max_per_channel:
                type: integer
              since_hours:
                type: integer
              limit:
                type: integer
      responses:
        "200":
          description: Canonical feed derived from relay events
        "500":
          description: Failed to aggregate relay events

  /distillery/distribute-from-events:
    post:
      operationId: distilleryDistributeFromEvents
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      parameters:
        - in: body
          name: request
          required: true
          schema:
            type: object
            properties:
              surface:
                type: string
              account_id:
                type: string
              channel:
                type: string
              slot_count:
                type: integer
              max_per_author:
                type: integer
              max_per_channel:
                type: integer
              since_hours:
                type: integer
              limit:
                type: integer
      responses:
        "200":
          description: Distributed feed derived from relay events

  /relay/pull:
    get:
      operationId: relayPull
      x-google-backend:
        address: https://tisane-relay-qsp3ipbqma-uc.a.run.app
        protocol: "h2"
      responses:
        "200":
          description: OK
